version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: unione_db
    environment:
      POSTGRES_DB: unione
      POSTGRES_USER: unione
      POSTGRES_PASSWORD: unione_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: unione_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
